<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seraph Browser</title>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background: #0f0f14;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#topbar {
  background: #181825;
  padding: 8px;
  display: flex;
  gap: 6px;
}
button {
  background: #2a2a3a;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
button:hover { background: #3a3a55; }
#address {
  flex: 1;
  padding: 6px;
  border-radius: 6px;
  border: none;
  background: #101018;
  color: white;
}
#tabs {
  display: flex;
  background: #11111a;
  padding: 4px;
  gap: 4px;
  overflow-x: auto;
}
.tab {
  background: #2a2a3a;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.tab.active { background: #44446a; }

iframe {
  flex: 1;
  border: none;
  width: 100%;
  display: none;
}
iframe.active {
  display: block;
}
</style>
</head>

<body>

<div id="tabs"></div>

<div id="topbar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="refresh()">⟳</button>
  <button onclick="addTab()">+</button>
  <input id="address" placeholder="Enter URL">
  <button onclick="navigate()">Go</button>
</div>

<div id="frames"></div>

<script>
/* =========================
   🔧 CHANGE THIS START URL
========================= */
const START_URL = "https://croxyproxy.com"; 
// Change to: "https://testwebsite123.com" etc.


let tabs = [];
let activeTab = null;
let tabCounter = 0;

const tabsContainer = document.getElementById("tabs");
const framesContainer = document.getElementById("frames");
const addressBar = document.getElementById("address");

function createTab(url = START_URL) {
  const id = tabCounter++;

  // Create tab button
  const tabBtn = document.createElement("div");
  tabBtn.className = "tab";
  tabBtn.textContent = "Tab " + id;
  tabBtn.onclick = () => switchTab(id);

  tabsContainer.appendChild(tabBtn);

  // Create iframe
  const iframe = document.createElement("iframe");
  iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups";
  iframe.src = url;

  iframe.addEventListener("load", () => {
    try {
      // Force window.open into new internal tab
      iframe.contentWindow.open = function(newUrl) {
        createTab(newUrl);
      };

      // Update address bar (only works same-origin)
      addressBar.value = iframe.contentWindow.location.href;
    } catch (e) {
      addressBar.value = iframe.src;
    }
  });

  framesContainer.appendChild(iframe);

  tabs.push({ id, tabBtn, iframe });
  switchTab(id);
}

function switchTab(id) {
  tabs.forEach(tab => {
    tab.tabBtn.classList.remove("active");
    tab.iframe.classList.remove("active");
  });

  const tab = tabs.find(t => t.id === id);
  if (!tab) return;

  tab.tabBtn.classList.add("active");
  tab.iframe.classList.add("active");
  activeTab = tab;

  addressBar.value = tab.iframe.src;
}

function addTab() {
  createTab();
}

function navigate() {
  if (!activeTab) return;

  let url = addressBar.value.trim();
  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  activeTab.iframe.src = url;
}

function goBack() {
  try { activeTab.iframe.contentWindow.history.back(); }
  catch {}
}

function goForward() {
  try { activeTab.iframe.contentWindow.history.forward(); }
  catch {}
}

function refresh() {
  try { activeTab.iframe.contentWindow.location.reload(); }
  catch {}
}

// Create first tab
createTab();
</script>

</body>
</html>
